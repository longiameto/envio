<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comparte Archivos P2P - v7.0 (Corregido)</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{--bg:#0b1120;--card:#1e293b;--text:#e2e8f0;--accent:#3b82f6;--success:#22c55e;--error:#ef4444;--border:#334155}
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,sans-serif}
body{background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.container{background:var(--card);padding:1.5rem;border-radius:16px;width:100%;max-width:540px;box-shadow:0 12px 30px rgba(0,0,0,.5)}
h1{text-align:center;margin-bottom:1.2rem;font-size:1.5rem}
.row{display:flex;gap:10px;margin-bottom:12px}
input,button{width:100%;padding:12px;border-radius:10px;border:1px solid var(--border);background:#0f172a;color:var(--text);font-size:.95rem}
input:focus{outline:2px solid var(--accent);border-color:transparent}
button{cursor:pointer;font-weight:600;border:none;transition:all .2s}
.btn-role{flex:1;background:#334155;color:#fff;padding:16px;font-size:1.1rem}
.btn-role.active{background:var(--accent);box-shadow:0 0 15px rgba(59,130,246,.3)}
.btn-action{background:var(--accent);color:#fff;margin-top:12px}
.btn-action:disabled{opacity:.5;cursor:not-allowed}
.btn-secondary{background:#475569;color:#fff;margin-top:10px}
.btn-danger{background:#dc2626;color:#fff;margin-top:12px}
.info-box{background:#0f172a;padding:10px;border-radius:8px;font-family:monospace;font-size:.85rem;word-break:break-all;margin:10px 0;border:1px dashed var(--border);text-align:center}
.qr-container{display:flex;justify-content:center;margin:10px 0;background:#fff;padding:10px;border-radius:8px;width:fit-content;margin-inline:auto}
.status{margin-top:12px;padding:10px;border-radius:8px;text-align:center;font-size:.9rem}
.status.wait{background:#1e293b;color:#94a3b8}
.status.ok{background:#064e3b;color:var(--success)}
.status.err{background:#7f1d1d;color:var(--error)}
.progress-container{margin-top:15px;background:#0f172a;border-radius:10px;padding:12px;display:none}
.progress-bar{height:8px;background:#334155;border-radius:4px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--success));width:0;transition:width .3s}
.stats{display:flex;justify-content:space-between;font-size:.8rem;color:#94a3b8;margin-top:5px}
.file-list{max-height:120px;overflow-y:auto;margin-top:10px;font-size:.85rem;color:#cbd5e1;border-top:1px solid #334155;padding-top:8px}
.file-item{padding:4px 0;display:flex;justify-content:space-between}
.hidden{display:none!important}
.note{font-size:.75rem;color:#64748b;margin-top:6px;text-align:center}
.step-indicator{text-align:center;margin-bottom:15px;padding:8px;background:#0f172a;border-radius:8px;font-size:.9rem;color:var(--accent);font-weight:600}
.file-select-buttons{display:flex;flex-direction:column;gap:8px;margin:10px 0}
.history-container{margin-top:15px;background:#0f172a;border-radius:10px;padding:10px;max-height:150px;overflow-y:auto}
.history-item{padding:6px 0;border-bottom:1px solid #1e293b;font-size:.8rem}
.history-item:last-child{border-bottom:none}
.history-time{color:#64748b;font-size:.75rem}
.toast-container{position:fixed;top:20px;right:20px;z-index:1000}
.toast{background:var(--card);border-left:4px solid var(--accent);padding:12px 16px;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.3);margin-bottom:8px;animation:slideIn .3s}
.toast.success{border-color:var(--success)}
.toast.error{border-color:var(--error)}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
</style>
</head>
<body>
<div class="toast-container" id="toast-container"></div>
<div class="container">
<h1>📡 Transferencia P2P</h1>
<div class="step-indicator" id="step-indicator">Paso 1: Selecciona tu rol</div>
<div id="role-selection"><div class="row">
<button class="btn-role" id="btn-send" onclick="setRole('send')">📤 Emisor</button>
<button class="btn-role" id="btn-receive" onclick="setRole('receive')">📥 Receptor</button>
</div></div>
<div id="sender-auth" class="hidden">
<input type="text" id="sender-id" placeholder="Tu ID (6-32 caracteres)" maxlength="32">
<input type="password" id="sender-password" placeholder="Contraseña (opcional)">
<div class="note">🔒 Cifrado WebRTC</div>
<button class="btn-action" onclick="setupSender()">Continuar →</button>
</div>
<div id="receiver-auth" class="hidden">
<input type="text" id="receiver-target-id" placeholder="ID del emisor">
<input type="password" id="receiver-password" placeholder="Contraseña">
<div class="note">🔑 Pídelo al emisor</div>
<button class="btn-action" onclick="connectToSender()">🔗 Conectar</button>
</div>
<div id="sender-ui" class="hidden">
<div class="info-box" id="my-id-display"></div>
<div class="qr-container" id="qr-code"></div>
<button class="btn-secondary" onclick="copyId()">📋 Copiar ID</button>
<div class="note">Escanea o comparte el ID</div>
<div class="file-select-buttons">
<input type="file" id="file-input" multiple style="display:none" onchange="handleFilesSelected()">
<input type="file" id="folder-input" webkitdirectory directory multiple style="display:none" onchange="handleFilesSelected()">
<button class="btn-action" onclick="document.getElementById('file-input').click()">📄 Archivos</button>
<button class="btn-secondary" onclick="document.getElementById('folder-input').click()">📂 Carpeta</button>
</div>
<div id="files-selected" class="hidden">
<div class="note" id="files-count"></div>
<button class="btn-action" id="btn-start" onclick="startTransfer()">🚀 Iniciar</button>
</div>
</div>
<div class="progress-container" id="progress-ui">
<div style="display:flex;justify-content:space-between;margin-bottom:4px">
<span id="progress-file">Esperando...</span><span id="progress-percent">0%</span>
</div>
<div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
<div class="stats"><span id="progress-speed">0 KB/s</span><span id="progress-eta">⏳ --:--</span></div>
<div class="file-list" id="file-log"></div>
</div>
<div class="history-container hidden" id="history-ui">
<div style="font-weight:600;margin-bottom:8px;color:#94a3b8">📋 Historial</div>
<div id="history-list"></div>
</div>
<div id="status" class="status wait">⏳ Selecciona Emisor o Receptor</div>
<button class="btn-danger" onclick="hardReset()">🗑️ Reiniciar</button>
</div>
<script>
const CHUNK_SIZE=256*1024,DB_NAME='P2PTransferDB',SESSION_KEY='p2p_final',HISTORY_KEY='p2p_hist_final';
let peer,conn,role=null,files=[],transferId,startTime,bytesTransferred=0,currentPassword='',receiverConnected=false,filesReady=false,receiverBytesReceived=0,receiverStartTime=0,receiverTotalSize=0,receivedFiles={};
const dbPromise=new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,1);r.onupgradeneeded=e=>e.target.result.createObjectStore('ts',{keyPath:'id'});r.onsuccess=e=>res(e.target.result);r.onerror=e=>rej(e)});
async function clearAllState(){try{const db=await dbPromise;await db.transaction('ts','readwrite').objectStore('ts').clear();localStorage.removeItem(SESSION_KEY)}catch(e){}}

// FIX #2: Escape HTML para prevenir XSS
function escapeHtml(str){if(!str)return'';return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}

function saveHistory(entry){let h=JSON.parse(localStorage.getItem(HISTORY_KEY)||'[]');h.unshift(entry);if(h.length>20)h=h.slice(0,20);localStorage.setItem(HISTORY_KEY,JSON.stringify(h));renderHistory()}
function renderHistory(){const h=JSON.parse(localStorage.getItem(HISTORY_KEY)||'[]'),l=document.getElementById('history-list');if(!h.length){l.innerHTML='<div style="color:#64748b">Sin transferencias</div>';return}l.innerHTML=h.map(x=>`<div class="history-item"><div style="display:flex;justify-content:space-between"><span>${x.type==='send'?'📤':'📥'} ${escapeHtml(x.fileName)}</span><span class="history-time">${escapeHtml(x.time)}</span></div><div style="color:#64748b;font-size:.75rem">${escapeHtml(x.size)} • ${escapeHtml(x.duration)}</div></div>`).join('');document.getElementById('history-ui').classList.remove('hidden')}
function playCompleteSound(){try{const c=new(window.AudioContext||window.webkitAudioContext)(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.setValueAtTime(523.25,c.currentTime);o.frequency.setValueAtTime(659.25,c.currentTime+.1);o.frequency.setValueAtTime(783.99,c.currentTime+.2);g.gain.setValueAtTime(.3,c.currentTime);g.gain.exponentialRampToValueAtTime(.01,c.currentTime+.5);o.start(c.currentTime);o.stop(c.currentTime+.5)}catch(e){}}
function showToast(m,t='info'){const c=document.getElementById('toast-container'),e=document.createElement('div');e.className=`toast ${t}`;e.textContent=m;c.appendChild(e);setTimeout(()=>{e.style.opacity='0';setTimeout(()=>e.remove(),300)},3e3)}

// FIX #7: peer.destroy() en hardReset
function hardReset(){if(confirm('⚠️ ¿Borrar todo?')){if(peer&&!peer.destroyed)peer.destroy();clearAllState();localStorage.removeItem(HISTORY_KEY);location.reload()}}

function setRole(r){role=r;document.getElementById('btn-send').classList.toggle('active',r==='send');document.getElementById('btn-receive').classList.toggle('active',r==='receive');document.getElementById('role-selection').classList.add('hidden');document.getElementById('step-indicator').textContent=`Paso 2: ${r==='send'?'Configura tu ID':'Conéctate'}`;if(r==='send'){document.getElementById('sender-auth').classList.remove('hidden');setStatus('🔐 Ingresa tu ID','wait')}else{document.getElementById('receiver-auth').classList.remove('hidden');setStatus('🔑 Ingresa ID del emisor','wait')}}

function setupSender(){const id=document.getElementById('sender-id').value.trim(),pwd=document.getElementById('sender-password').value;if(id.length<6||id.length>32)return showToast('❌ ID: 6-32 caracteres','error');if(!/^[a-zA-Z0-9_-]+$/.test(id))return showToast('❌ Solo letras, números y guiones','error');transferId=`p2p-${id}`;currentPassword=pwd;// FIX #1: NO guardar contraseña en localStoragelocalStorage.setItem(SESSION_KEY,JSON.stringify({role:'send',id,ts:Date.now(),hadPwd:!!pwd}));document.getElementById('sender-auth').classList.add('hidden');document.getElementById('sender-ui').classList.remove('hidden');document.getElementById('my-id-display').textContent=`Tu ID: ${id}`;document.getElementById('step-indicator').textContent='Paso 3: Selecciona archivos';document.getElementById('qr-code').innerHTML='';new QRCode(document.getElementById('qr-code'),{text:id,width:120,height:120,colorDark:"#0f172a",colorLight:"#ffffff",correctLevel:QRCode.CorrectLevel.L});initPeer()}

function setStatus(m,t='wait'){const e=document.getElementById('status');e.textContent=m;e.className=`status ${t}`}
function updateProgress(pct,fn,sp,et){document.getElementById('progress-ui').style.display='block';document.getElementById('progress-fill').style.width=`${Math.min(100,Math.max(0,pct))}%`;document.getElementById('progress-percent').textContent=`${Math.min(100,Math.max(0,pct)).toFixed(1)}%`;document.getElementById('progress-file').textContent=fn;document.getElementById('progress-speed').textContent=sp;document.getElementById('progress-eta').textContent=et}

// FIX #2: escapeHtml en logFile
function logFile(m){const l=document.getElementById('file-log');l.innerHTML+=`<div class="file-item">${escapeHtml(m)}</div>`;l.scrollTop=l.scrollHeight}

function handleFilesSelected(){const fi=document.getElementById('file-input'),fo=document.getElementById('folder-input');files=[...fi.files,...fo.files].sort((a,b)=>(a.webkitRelativePath||a.name).localeCompare(b.webkitRelativePath||b.name));if(files.length){filesReady=true;document.getElementById('files-selected').classList.remove('hidden');const ts=files.reduce((s,f)=>s+f.size,0);document.getElementById('files-count').textContent=`📦 ${files.length} archivo(s) - ${formatSize(ts)}`;setStatus(receiverConnected?'✅ Listo. ¡Pulsa INICIAR!':'⏳ Esperando receptor...',receiverConnected?'ok':'wait')}}
function formatSize(b){if(!b)return'0 Bytes';const k=1024,s=['Bytes','KB','MB','GB'],i=Math.floor(Math.log(b)/Math.log(k));return(b/Math.pow(k,i)).toFixed(2)+' '+s[i]}
function copyId(){const id=document.getElementById('sender-id').value,txt=currentPassword?`ID: ${id}\nContraseña: ${currentPassword}`:`ID: ${id}`;navigator.clipboard.writeText(txt).then(()=>showToast('📋 Copiado','success'))}

function setupConnection(){conn.on('open',()=>{if(role==='send'){conn.on('data',handleSenderData);setStatus('🔐 Esperando autenticación...','wait')}else{conn.send({type:'auth',password:currentPassword});setStatus('🔐 Autenticando...','wait')}});conn.on('data',d=>{if(role==='receive')handleReceiverData(d)});// FIX #4: Error handler para data channelconn.on('error',err=>{setStatus(`❌ Error de canal: ${err}`,'err');showToast('❌ Error en la conexión de datos','error')});conn.on('close',()=>{receiverConnected=false;setStatus('🔌 Desconectado','wait')})}

function handleSenderData(d){if(d.type==='auth'){if(currentPassword&&d.password!==currentPassword){conn.send({type:'auth_fail'});setTimeout(()=>conn.close(),100);return showToast('❌ Contraseña incorrecta','error')}conn.send({type:'auth_ok'});receiverConnected=true;setStatus('✅ Receptor conectado','ok');showToast('🔗 Conectado','success');if(filesReady)setStatus('✅ Listo. ¡Pulsa INICIAR!','ok')}}

function handleReceiverData(d){if(d.type==='auth_ok'){setStatus('✅ Conectado. Recibiendo...','ok');showToast('🔗 Conectado','success');document.getElementById('receiver-auth').classList.add('hidden');document.getElementById('progress-ui').style.display='block';document.getElementById('step-indicator').textContent='Recibiendo...';receiverStartTime=Date.now();receiverBytesReceived=0;receivedFiles={}}else if(d.type==='auth_fail'){showToast('❌ Contraseña incorrecta','error');conn.close()}else if(d.type==='file_info')handleFileInfo(d);else if(d.type==='chunk')handleChunk(d);else if(d.type==='complete')finalizeFile(d.fileName)}

function initPeer(){peer=new Peer(transferId,{debug:0});peer.on('open',()=>{setStatus('🟢 Listo. Esperando...','ok');showToast('✅ Listo','success')});peer.on('connection',c=>{conn=c;setupConnection()});peer.on('error',e=>{if(e.type==='unavailable-id'){setStatus('🔒 ID en uso','err');showToast('❌ ID ya existe','error')}else{setStatus(`❌ Error: ${e.type}`,'err')}})}

function connectToSender(){const tid=document.getElementById('receiver-target-id').value.trim(),pwd=document.getElementById('receiver-password').value;if(!tid||tid.length<6)return showToast('❌ ID inválido','error');currentPassword=pwd;const tgt=`p2p-${tid}`;setStatus('🔄 Conectando...','wait');peer=new Peer({debug:0});peer.on('open',()=>{setStatus('🔄 Conectando...','wait');conn=peer.connect(tgt);setupConnection()});peer.on('error',e=>{if(e.type==='peer-unavailable'){setStatus('❌ Emisor no encontrado','err');showToast('❌ Verifica el ID','error')}else{setStatus(`❌ Error: ${e.type}`,'err')}})}

async function startTransfer(){if(!files.length||!filesReady)return showToast('❌ Selecciona archivos','error');if(!conn||!conn.open)return showToast('❌ Sin conexión','error');if(!receiverConnected)return showToast('⏳ Esperando receptor...','info');startTime=Date.now();bytesTransferred=0;document.getElementById('btn-start').disabled=true;document.getElementById('btn-start').textContent='⏳ Enviando...';setStatus('📤 Iniciando...','wait');const ts=files.reduce((s,f)=>s+f.size,0);for(let i=0;i<files.length;i++){await sendFile(files[i],i,ts);await new Promise(r=>setTimeout(r,200))}const dur=((Date.now()-startTime)/1e3).toFixed(1);setStatus(`🎉 Completado en ${dur}s`,'ok');showToast('🎉 Exitoso','success');document.getElementById('btn-start').textContent='✅ OK';document.getElementById('btn-start').disabled=false;files.forEach(f=>saveHistory({type:'send',fileName:f.webkitRelativePath||f.name,size:formatSize(f.size),time:new Date().toLocaleString(),duration:`${dur}s`}));playCompleteSound();await clearAllState()}

async function sendFile(file,idx,ts){const fn=file.webkitRelativePath||file.name,tc=Math.ceil(file.size/CHUNK_SIZE);logFile(`📤 ${fn} (${formatSize(file.size)})`);conn.send({type:'file_info',fileName:fn,fileSize:file.size,totalChunks:tc,fileId:`${file.name}-${file.size}-${idx}`,totalFilesSize:ts});await new Promise(r=>setTimeout(r,100));for(let c=0;c<tc;c++){const chunk=file.slice(c*CHUNK_SIZE,(c+1)*CHUNK_SIZE),buf=await chunk.arrayBuffer();conn.send({type:'chunk',fileId:`${file.name}-${file.size}-${idx}`,index:c,data:buf,total:tc});bytesTransferred+=buf.byteLength;const fp=(c+1)/tc,op=((idx+fp)/files.length)*100,now=Date.now(),el=(now-startTime)/1e3||1,sp=bytesTransferred/el,rm=sp>0?(ts-bytesTransferred)/sp:0,ss=sp>1048576?`${(sp/1048576).toFixed(1)} MB/s`:`${(sp/1024).toFixed(0)} KB/s`,es=rm>86400||rm<0?'⏳ --:--':`⏳ ${Math.floor(rm/60)}:${String(Math.floor(rm%60)).padStart(2,'0')}`;updateProgress(Math.min(100,op),fn,ss,es);if(conn.bufferedAmount>4*1024*1024)await new Promise(r=>setTimeout(r,300));else await new Promise(r=>setTimeout(r,50))}if(idx===files.length-1)updateProgress(100,fn,'0 KB/s','⏳ 0:00');await new Promise(r=>setTimeout(r,200));conn.send({type:'complete',fileName:fn});logFile(`✅ ${fn} enviado`)}

function handleFileInfo(d){receivedFiles[d.fileId]={name:d.fileName,size:d.fileSize,totalChunks:d.totalChunks,chunks:new Array(d.totalChunks),received:0};receiverTotalSize=d.totalFilesSize||d.fileSize;logFile(`📥 ${d.fileName}`);updateReceiverProgress(d.fileName,0);// FIX #3: Manejar archivos de 0 bytesif(d.totalChunks===0){downloadFile(receivedFiles[d.fileId])}}

function handleChunk(d){const fd=receivedFiles[d.fileId];if(!fd||fd.chunks[d.index])return;fd.chunks[d.index]=d.data;fd.received++;receiverBytesReceived+=d.data.byteLength;updateReceiverProgress(fd.name,(fd.received/fd.totalChunks)*100);if(fd.received===fd.totalChunks){logFile(`✓ ${fd.name}: Descargando...`);downloadFile(fd)}}

function downloadFile(fd){try{const vc=fd.chunks.filter(c=>c!==undefined&&c!==null);if(vc.length!==fd.totalChunks){logFile(`❌ Faltan chunks (${vc.length}/${fd.totalChunks})`);return}const bl=new Blob(vc);if(!bl.size){logFile('❌ Blob vacío');return}const url=URL.createObjectURL(bl),a=document.createElement('a');a.href=url;a.download=fd.name;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);fd.chunks=null;delete receivedFiles[Object.keys(receivedFiles).find(k=>receivedFiles[k]===fd)];logFile(`✅ ${fd.name} descargado (${formatSize(bl.size)})`);// FIX #6: Mover finalizeFile al final de downloadFileif(!Object.keys(receivedFiles).length){const dur=((Date.now()-receiverStartTime)/1e3).toFixed(1);setStatus(`🎉 Completado en ${dur}s`,'ok');playCompleteSound();saveHistory({type:'receive',fileName:fd.name,size:formatSize(fd.size),time:new Date().toLocaleString(),duration:`${dur}s`})}}catch(e){logFile(`❌ Error: ${e.message}`)}}

// FIX #6: finalizeFile ahora solo para compatibilidad, sin log duplicado
function finalizeFile(fn){/* log movido a downloadFile */}

function updateReceiverProgress(fn,pct){const now=Date.now(),el=(now-receiverStartTime)/1e3||1,sp=receiverBytesReceived/el,rm=sp>0&&receiverTotalSize>receiverBytesReceived?(receiverTotalSize-receiverBytesReceived)/sp:0,ss=sp>1048576?`${(sp/1048576).toFixed(1)} MB/s`:`${(sp/1024).toFixed(0)} KB/s`,es=rm>86400||rm<0||el<1?'⏳ --:--':`⏳ ${Math.floor(rm/60)}:${String(Math.floor(rm%60)).padStart(2,'0')}`;updateProgress(pct,fn,ss,es)}

window.onload=async()=>{renderHistory();const sv=localStorage.getItem(SESSION_KEY);if(sv){const ss=JSON.parse(sv),ag=(Date.now()-ss.ts)/1e3/60/60;// FIX #1: Si la sesión tenía contraseña, NO restaurar automáticamenteif(ag<1&&ss.role==='send'&&!ss.hadPwd){document.getElementById('sender-id').value=ss.id;setRole('send');setupSender();setStatus('🔄 Sesión restaurada','wait')}else{localStorage.removeItem(SESSION_KEY);await clearAllState()}}};
</script>
</body>
</html>
