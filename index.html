<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comparte Archivos P2P - v4.1</title>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <style>
    :root { --bg: #0b1120; --card: #1e293b; --text: #e2e8f0; --accent: #3b82f6; --success: #22c55e; --error: #ef4444; --warn: #f59e0b; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
    body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    .container { background: var(--card); padding: 1.5rem; border-radius: 12px; width: 100%; max-width: 520px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
    h1 { text-align: center; margin-bottom: 1rem; font-size: 1.4rem; }
    .row { display: flex; gap: 10px; margin-bottom: 10px; }
    input, button { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: var(--text); font-size: 0.95rem; }
    input:focus { outline: 2px solid var(--accent); border-color: transparent; }
    button { cursor: pointer; font-weight: 600; transition: 0.2s; border: none; }
    .btn-role { flex: 1; background: #334155; color: white; padding: 15px; font-size: 1.1rem; }
    .btn-role.active { background: var(--accent); }
    .btn-action { background: var(--accent); color: white; margin-top: 10px; }
    .btn-action:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { background: #475569; color: white; margin-top: 8px; }
    .btn-danger { background: #dc2626; color: white; margin-top: 8px; }
    .info-box { background: #0f172a; padding: 8px; border-radius: 6px; font-family: monospace; font-size: 0.85rem; word-break: break-all; margin: 8px 0; border: 1px dashed #475569; }
    .status { margin-top: 10px; padding: 8px; border-radius: 6px; text-align: center; font-size: 0.9rem; }
    .status.wait { background: #1e293b; color: #94a3b8; }
    .status.ok { background: #064e3b; color: var(--success); }
    .status.err { background: #7f1d1d; color: var(--error); }
    .progress-container { margin-top: 15px; background: #0f172a; border-radius: 8px; padding: 10px; display: none; }
    .progress-bar { height: 8px; background: #334155; border-radius: 4px; overflow: hidden; margin: 8px 0; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--success)); width: 0%; transition: width 0.3s; }
    .stats { display: flex; justify-content: space-between; font-size: 0.8rem; color: #94a3b8; margin-top: 5px; }
    .file-list { max-height: 150px; overflow-y: auto; margin-top: 8px; font-size: 0.85rem; color: #cbd5e1; }
    .file-item { padding: 4px 0; border-bottom: 1px solid #1e293b; display: flex; justify-content: space-between; }
    .hidden { display: none; }
    .note { font-size: 0.75rem; color: #64748b; margin-top: 5px; text-align: center; }
    .step-indicator { text-align: center; margin-bottom: 15px; padding: 8px; background: #0f172a; border-radius: 6px; font-size: 0.9rem; }
    .file-select-buttons { display: flex; flex-direction: column; gap: 8px; margin: 10px 0; }
    .history-container { margin-top: 15px; background: #0f172a; border-radius: 8px; padding: 10px; max-height: 200px; overflow-y: auto; }
    .history-item { padding: 6px 0; border-bottom: 1px solid #1e293b; font-size: 0.8rem; }
    .history-item:last-child { border-bottom: none; }
    .history-time { color: #64748b; font-size: 0.75rem; }
  </style>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
</head>
<body>
  <div class="container">
    <h1>📡 Transferencia P2P Segura</h1>
    
    <div class="step-indicator" id="step-indicator">Paso 1: Selecciona tu rol</div>

    <!-- PASO 1: SELECCIÓN DE ROL -->
    <div id="role-selection">
      <div class="row">
        <button class="btn-role" id="btn-send" onclick="setRole('send')">📤 Emisor</button>
        <button class="btn-role" id="btn-receive" onclick="setRole('receive')">📥 Receptor</button>
      </div>
    </div>

    <!-- PASO 2: ID Y CONTRASEÑA (EMISOR) -->
    <div id="sender-auth" class="hidden">
      <input type="text" id="sender-id" placeholder="Tu ID personalizado (6-32 caracteres)" maxlength="32">
      <input type="password" id="sender-password" placeholder="Contraseña (opcional)">
      <div class="note">🔒 La contraseña evita conexiones no deseadas</div>
      <button class="btn-action" onclick="setupSender()">Continuar →</button>
    </div>

    <!-- PASO 2: CONEXIÓN (RECEPTOR) -->
    <div id="receiver-auth" class="hidden">
      <input type="text" id="receiver-target-id" placeholder="ID del emisor">
      <input type="password" id="receiver-password" placeholder="Contraseña del emisor">
      <div class="note">🔑 Pídele al emisor su ID y contraseña</div>
      <button class="btn-action" onclick="connectToSender()">🔗 Conectar</button>
    </div>

    <!-- PASO 3: UI DE EMISOR -->
    <div id="sender-ui" class="hidden">
      <div class="info-box" id="my-id-display"></div>
      <button class="btn-secondary" onclick="copyId()">📋 Copiar ID</button>
      <div class="note">Comparte este ID con el receptor</div>
      
      <div class="file-select-buttons">
        <input type="file" id="file-input" multiple style="display:none" onchange="handleFilesSelected()">
        <input type="file" id="folder-input" webkitdirectory directory multiple style="display:none" onchange="handleFilesSelected()">
        <button class="btn-action" onclick="document.getElementById('file-input').click()">📄 Seleccionar Archivos</button>
        <button class="btn-secondary" onclick="document.getElementById('folder-input').click()">📂 Seleccionar Carpeta</button>
      </div>
      
      <div id="files-selected" class="hidden">
        <div class="note" id="files-count"></div>
        <button class="btn-action" id="btn-start" onclick="startTransfer()">🚀 Iniciar Transferencia</button>
      </div>
    </div>

    <!-- PROGRESO -->
    <div class="progress-container" id="progress-ui">
      <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
        <span id="progress-file">Esperando...</span>
        <span id="progress-percent">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="stats">
        <span id="progress-speed">0 KB/s</span>
        <span id="progress-eta">⏳ --:--</span>
      </div>
      <div class="file-list" id="file-log"></div>
    </div>

    <!-- HISTORIAL -->
    <div class="history-container hidden" id="history-ui">
      <div style="font-weight:600; margin-bottom:8px; color:#94a3b8;">📋 Historial de Transferencias</div>
      <div id="history-list"></div>
    </div>

    <div id="status" class="status wait">⏳ Selecciona si eres Emisor o Receptor</div>
    <button class="btn-danger" onclick="hardReset()">🗑️ Borrar Todo y Reiniciar</button>
  </div>

  <script>
    // --- CONFIGURACIÓN ---
    const CHUNK_SIZE = 512 * 1024; // 512KB por chunk (más pequeño para mejor compatibilidad)
    const DB_NAME = 'P2PTransferDB';
    const STORE_NAME = 'transferState';
    const SESSION_KEY = 'p2p_session_v4';
    const HISTORY_KEY = 'p2p_history_v4';
    
    let peer, conn, role = null, files = [], currentFileIndex = 0;
    let transferId, sentChunks = new Set();
    let startTime, bytesTransferred = 0;
    let currentPassword = '';
    let receiverConnected = false;
    let filesReady = false;
    
    // Para el receptor
    let receiverBytesReceived = 0;
    let receiverStartTime = 0;
    let receiverTotalSize = 0;
    let receivedFiles = {};
    let currentReceivingFile = null;

    // --- INDEXEDDB ---
    const dbPromise = new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = e => e.target.result.createObjectStore(STORE_NAME, { keyPath: 'id' });
      req.onsuccess = e => resolve(e.target.result);
      req.onerror = e => reject(e);
    });

    async function saveState(data) {
      try {
        const db = await dbPromise;
        const tx = db.transaction(STORE_NAME, 'readwrite');
        tx.objectStore(STORE_NAME).put(data);
      } catch(e) { console.error('Save error:', e); }
    }

    async function loadState(id) {
      try {
        const db = await dbPromise;
        return new Promise(resolve => {
          const tx = db.transaction(STORE_NAME, 'readonly');
          const req = tx.objectStore(STORE_NAME).get(id);
          req.onsuccess = () => resolve(req.result || null);
        });
      } catch(e) { return null; }
    }

    async function clearAllState() {
      try {
        const db = await dbPromise;
        const tx = db.transaction(STORE_NAME, 'readwrite');
        await tx.objectStore(STORE_NAME).clear();
        localStorage.removeItem(SESSION_KEY);
      } catch(e) { console.error('Clear error:', e); }
    }

    // --- HISTORIAL ---
    function saveHistory(entry) {
      try {
        let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
        history.unshift(entry);
        if (history.length > 20) history = history.slice(0, 20);
        localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
        renderHistory();
      } catch(e) { console.error('History error:', e); }
    }

    function renderHistory() {
      const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
      const list = document.getElementById('history-list');
      
      if (history.length === 0) {
        list.innerHTML = '<div style="color:#64748b; font-size:0.8rem;">Sin transferencias aún</div>';
        return;
      }
      
      list.innerHTML = history.map(h => `
        <div class="history-item">
          <div style="display:flex; justify-content:space-between;">
            <span style="color:#cbd5e1;">${h.type === 'send' ? '📤 Enviado' : '📥 Recibido'}: ${h.fileName}</span>
            <span class="history-time">${h.time}</span>
          </div>
          <div style="color:#64748b; font-size:0.75rem;">${h.size} • ${h.duration || 'N/A'}</div>
        </div>
      `).join('');
      
      document.getElementById('history-ui').classList.remove('hidden');
    }

    // --- SONIDO ---
    function playCompleteSound() {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime);
        oscillator.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1);
        oscillator.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2);
        
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        
        oscillator.start(audioCtx.currentTime);
        oscillator.stop(audioCtx.currentTime + 0.5);
      } catch(e) { console.error('Sound error:', e); }
    }

    // --- HARD RESET ---
    function hardReset() {
      if (confirm('⚠️ Esto borrará TODOS los datos guardados y reiniciará la app. ¿Continuar?')) {
        clearAllState();
        localStorage.removeItem(HISTORY_KEY);
        location.reload();
      }
    }

    // --- UI & ROLES ---
    function setRole(r) {
      role = r;
      document.getElementById('btn-send').classList.toggle('active', r === 'send');
      document.getElementById('btn-receive').classList.toggle('active', r === 'receive');
      document.getElementById('role-selection').classList.add('hidden');
      document.getElementById('step-indicator').textContent = `Paso 2: ${r === 'send' ? 'Configura tu ID' : 'Conéctate al emisor'}`;
      
      if (r === 'send') {
        document.getElementById('sender-auth').classList.remove('hidden');
        setStatus('🔐 Ingresa tu ID (6-32 caracteres)', 'wait');
      } else {
        document.getElementById('receiver-auth').classList.remove('hidden');
        setStatus('🔑 Ingresa ID y contraseña del emisor', 'wait');
      }
    }

    function setupSender() {
      const idInput = document.getElementById('sender-id').value.trim();
      const pwd = document.getElementById('sender-password').value;
      
      if (idInput.length < 6 || idInput.length > 32) {
        return setStatus('❌ ID debe tener 6-32 caracteres', 'err');
      }
      if (!/^[a-zA-Z0-9_-]+$/.test(idInput)) {
        return setStatus('❌ Solo letras, números y guiones', 'err');
      }
      
      transferId = `p2p-${idInput}`;
      currentPassword = pwd;
      
      localStorage.setItem(SESSION_KEY, JSON.stringify({
        role: 'send',
        id: idInput,
        password: pwd,
        timestamp: Date.now()
      }));
      
      document.getElementById('sender-auth').classList.add('hidden');
      document.getElementById('sender-ui').classList.remove('hidden');
      document.getElementById('my-id-display').textContent = `Tu ID: ${idInput}`;
      document.getElementById('step-indicator').textContent = 'Paso 3: Selecciona archivos';
      
      initPeer();
    }

    function setStatus(msg, type = 'wait') {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = `status ${type}`;
    }

    function updateProgress(percent, fileName, speed, eta) {
      document.getElementById('progress-ui').style.display = 'block';
      document.getElementById('progress-fill').style.width = `${Math.min(100, Math.max(0, percent))}%`;
      document.getElementById('progress-percent').textContent = `${Math.min(100, Math.max(0, percent)).toFixed(1)}%`;
      document.getElementById('progress-file').textContent = fileName;
      document.getElementById('progress-speed').textContent = speed;
      document.getElementById('progress-eta').textContent = eta;
    }

    function logFile(msg) {
      const log = document.getElementById('file-log');
      log.innerHTML += `<div class="file-item">${msg}</div>`;
      log.scrollTop = log.scrollHeight;
    }

    function handleFilesSelected() {
      const fileInput = document.getElementById('file-input');
      const folderInput = document.getElementById('folder-input');
      
      files = Array.from(fileInput.files).concat(Array.from(folderInput.files));
      files = files.sort((a, b) => (a.webkitRelativePath || a.name).localeCompare(b.webkitRelativePath || b.name));
      
      if (files.length > 0) {
        filesReady = true;
        document.getElementById('files-selected').classList.remove('hidden');
        const totalSize = files.reduce((a, f) => a + f.size, 0);
        document.getElementById('files-count').textContent = `📦 ${files.length} archivo(s) - ${formatSize(totalSize)}`;
        
        if (receiverConnected) {
          setStatus('✅ Archivos listos. ¡Pulsa INICIAR!', 'ok');
        } else {
          setStatus('⏳ Archivos listos. Esperando receptor...', 'wait');
        }
      }
    }

    function formatSize(bytes) {
      if (bytes === 0) return '0 Bytes';
      const k = 1024;
      const sizes = ['Bytes', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    function copyId() {
      const id = document.getElementById('sender-id').value;
      const pwd = currentPassword;
      const text = pwd ? `ID: ${id}\nContraseña: ${pwd}` : `ID: ${id}`;
      navigator.clipboard.writeText(text).then(() => {
        setStatus('📋 Copiado al portapapeles', 'ok');
        setTimeout(() => setStatus(receiverConnected ? '✅ Listo para enviar' : '⏳ Esperando receptor', 'wait'), 2000);
      });
    }

    // --- PEERJS & CONEXIÓN ---
    function initPeer() {
      peer = new Peer(transferId, { debug: 0 });
      
      peer.on('open', (id) => {
        setStatus('🟢 Listo. Esperando receptor...', 'ok');
      });

      peer.on('connection', c => {
        conn = c;
        setupConnection();
      });

      peer.on('error', err => {
        if (err.type === 'unavailable-id') {
          setStatus('🔒 ID en uso. Usa otro ID.', 'err');
        } else {
          setStatus(`❌ Error: ${err.type}`, 'err');
        }
      });
    }

    function connectToSender() {
      const targetId = document.getElementById('receiver-target-id').value.trim();
      const pwd = document.getElementById('receiver-password').value;
      
      if (!targetId || targetId.length < 6) {
        return setStatus('❌ ID inválido del emisor', 'err');
      }
      
      currentPassword = pwd;
      const target = `p2p-${targetId}`;
      
      setStatus('🔄 Conectando...', 'wait');
      
      peer = new Peer({ debug: 0 });
      
      peer.on('open', () => {
        setStatus('🔄 Autenticando...', 'wait');
        conn = peer.connect(target);
        setupConnection();
      });
      
      peer.on('error', err => {
        setStatus(`❌ Error: ${err.type}`, 'err');
      });
    }

    async function setupConnection() {
      conn.on('open', () => {
        if (role === 'send') {
          conn.on('data', handleSenderData);
          setStatus('🔐 Receptor conectado. Esperando auth...', 'wait');
        } else {
          conn.send({ type: 'auth', password: currentPassword });
          setStatus('🔐 Enviando credenciales...', 'wait');
        }
      });

      conn.on('data', data => {
        if (role === 'receive') {
          handleReceiverData(data);
        }
      });

      conn.on('close', () => {
        receiverConnected = false;
        setStatus('🔌 Desconectado', 'wait');
      });
    }

    function handleSenderData(data) {
      if (data.type === 'auth') {
        const pwd = currentPassword;
        if (pwd && data.password !== pwd) {
          conn.send({ type: 'auth_fail' });
          setTimeout(() => conn.close(), 100);
          return setStatus('❌ Contraseña incorrecta', 'err');
        }
        
        conn.send({ type: 'auth_ok' });
        receiverConnected = true;
        setStatus('✅ Receptor conectado. Selecciona archivos.', 'ok');
        
        if (filesReady) {
          setStatus('✅ Todo listo. ¡Pulsa INICIAR!', 'ok');
        }
      }
    }

    function handleReceiverData(data) {
      if (data.type === 'auth_ok') {
        setStatus('✅ Conectado. Recibiendo...', 'ok');
        document.getElementById('receiver-auth').classList.add('hidden');
        document.getElementById('progress-ui').style.display = 'block';
        document.getElementById('step-indicator').textContent = 'Recibiendo archivos...';
        receiverStartTime = Date.now();
        receiverBytesReceived = 0;
        receivedFiles = {};
        currentReceivingFile = null;
      } else if (data.type === 'auth_fail') {
        setStatus('❌ Contraseña incorrecta', 'err');
        conn.close();
      } else if (data.type === 'file_info') {
        handleFileInfo(data);
      } else if (data.type === 'chunk') {
        handleChunk(data);
      } else if (data.type === 'complete') {
        finalizeFile(data.fileName);
      }
    }

    // --- TRANSFERENCIA ---
    async function startTransfer() {
      if (!files.length || !filesReady) {
        return setStatus('❌ Selecciona archivos primero', 'err');
      }
      
      if (!conn || !conn.open) {
        return setStatus('❌ Sin conexión. Espera al receptor.', 'err');
      }
      
      if (!receiverConnected) {
        return setStatus('⏳ Esperando que el receptor se conecte...', 'wait');
      }
      
      currentFileIndex = 0;
      sentChunks.clear();
      startTime = Date.now();
      bytesTransferred = 0;
      
      document.getElementById('btn-start').disabled = true;
      document.getElementById('btn-start').textContent = '⏳ Enviando...';
      
      setStatus('📤 Iniciando transferencia...', 'wait');
      
      const totalSize = files.reduce((a, f) => a + f.size, 0);
      
      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        await sendFile(file, i, totalSize);
      }
      
      const duration = ((Date.now() - startTime) / 1000).toFixed(1);
      
      setStatus(`🎉 ¡Transferencia completada en ${duration}s!`, 'ok');
      document.getElementById('btn-start').textContent = '✅ Completado';
      document.getElementById('btn-start').disabled = false;
      
      files.forEach(f => {
        saveHistory({
          type: 'send',
          fileName: f.webkitRelativePath || f.name,
          size: formatSize(f.size),
          time: new Date().toLocaleString(),
          duration: `${duration}s`
        });
      });
      
      playCompleteSound();
      await clearAllState();
    }

    async function sendFile(file, index, totalSize) {
      const fileName = file.webkitRelativePath || file.name;
      const totalChunks = Math.ceil(file.size / CHUNK_SIZE);
      
      logFile(`📤 ${fileName} (${formatSize(file.size)})`);
      
      conn.send({
        type: 'file_info',
        fileName: fileName,
        fileSize: file.size,
        totalChunks: totalChunks,
        fileId: `${file.name}-${file.size}-${index}`,
        totalFilesSize: totalSize
      });
      
      // Pequeña pausa antes de enviar chunks
      await new Promise(r => setTimeout(r, 100));
      
      for (let c = 0; c < totalChunks; c++) {
        const chunk = file.slice(c * CHUNK_SIZE, (c + 1) * CHUNK_SIZE);
        const buffer = await chunk.arrayBuffer();
        
        conn.send({
          type: 'chunk',
          fileId: `${file.name}-${file.size}-${index}`,
          index: c,
          data: buffer,
          total: totalChunks
        });
        
        sentChunks.add(`${file.name}-${c}`);
        bytesTransferred += buffer.byteLength;
        
        const fileProgress = (c + 1) / totalChunks;
        const overallProgress = ((index + fileProgress) / files.length) * 100;
        
        const now = Date.now();
        const elapsed = (now - startTime) / 1000 || 1;
        const speed = bytesTransferred / elapsed;
        const remaining = speed > 0 ? (totalSize - bytesTransferred) / speed : 0;
        
        const speedStr = speed > 1048576 ? `${(speed / 1048576).toFixed(1)} MB/s` : `${(speed / 1024).toFixed(0)} KB/s`;
        const etaStr = remaining > 86400 || remaining < 0 ? '⏳ --:--' : `⏳ ${Math.floor(remaining / 60)}:${String(Math.floor(remaining % 60)).padStart(2, '0')}`;
        
        updateProgress(Math.min(100, overallProgress), fileName, speedStr, etaStr);
        
        // Control de flujo más agresivo
        if (conn.bufferedAmount > 8 * 1024 * 1024) {
          await new Promise(r => setTimeout(r, 200));
        }
      }
      
      // Asegurar 100% al finalizar
      if (index === files.length - 1) {
        updateProgress(100, fileName, '0 KB/s', '⏳ 0:00');
      }
      
      // Pequeña pausa antes de enviar "complete"
      await new Promise(r => setTimeout(r, 100));
      conn.send({ type: 'complete', fileName: fileName });
      logFile(`✅ ${fileName} enviado`);
    }
    
    function handleFileInfo(data) {
      receivedFiles[data.fileId] = {
        name: data.fileName,
        size: data.fileSize,
        totalChunks: data.totalChunks,
        chunks: new Array(data.totalChunks),
        received: 0
      };
      currentReceivingFile = data.fileId;
      receiverTotalSize = data.totalFilesSize || data.fileSize;
      updateReceiverProgress(data.fileName, 0);
    }

    function handleChunk(data) {
      const fileData = receivedFiles[data.fileId];
      if (!fileData) {
        console.error('Chunk recibido sin file_info previo:', data.fileId);
        return;
      }
      
      // Evitar duplicados
      if (fileData.chunks[data.index]) {
        return;
      }
      
      fileData.chunks[data.index] = data.data;
      fileData.received++;
      receiverBytesReceived += data.data.byteLength;
      
      const progress = (fileData.received / fileData.totalChunks) * 100;
      updateReceiverProgress(fileData.name, progress);
      
      // Verificar si está completo
      if (fileData.received === fileData.totalChunks) {
        downloadFile(fileData);
      }
    }

    function downloadFile(fileData) {
      try {
        // Filtrar chunks undefined
        const validChunks = fileData.chunks.filter(c => c !== undefined);
        
        if (validChunks.length !== fileData.totalChunks) {
          console.error(`Faltan chunks: ${validChunks.length}/${fileData.totalChunks}`);
          return;
        }
        
        const blob = new Blob(validChunks);
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = fileData.name;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        logFile(`✅ ${fileData.name} descargado (${formatSize(fileData.size)})`);
        delete receivedFiles[Object.keys(receivedFiles).find(key => receivedFiles[key] === fileData)];
        
        // Si era el último archivo
        if (Object.keys(receivedFiles).length === 0) {
          const duration = ((Date.now() - receiverStartTime) / 1000).toFixed(1);
          setStatus(`🎉 Completado en ${duration}s`, 'ok');
          playCompleteSound();
          
          saveHistory({
            type: 'receive',
            fileName: fileData.name,
            size: formatSize(fileData.size),
            time: new Date().toLocaleString(),
            duration: `${duration}s`
          });
        }
      } catch (e) {
        console.error('Error al descargar:', e);
        logFile(`❌ Error al descargar ${fileData.name}`);
      }
    }

    function finalizeFile(fileName) {
      logFile(`✅ ${fileName} completado`);
    }

    function updateReceiverProgress(fileName, percent) {
      const now = Date.now();
      const elapsed = (now - receiverStartTime) / 1000 || 1;
      const speed = receiverBytesReceived / elapsed;
      const remaining = speed > 0 && receiverTotalSize > receiverBytesReceived ? (receiverTotalSize - receiverBytesReceived) / speed : 0;
      
      const speedStr = speed > 1048576 ? `${(speed / 1048576).toFixed(1)} MB/s` : `${(speed / 1024).toFixed(0)} KB/s`;
      const etaStr = remaining > 86400 || remaining < 0 || elapsed < 1 ? '⏳ --:--' : `⏳ ${Math.floor(remaining / 60)}:${String(Math.floor(remaining % 60)).padStart(2, '0')}`;
      
      updateProgress(percent, fileName, speedStr, etaStr);
    }

    // --- INICIO ---
    window.onload = async () => {
      renderHistory();
      
      const saved = localStorage.getItem(SESSION_KEY);
      if (saved) {
        const session = JSON.parse(saved);
        const age = (Date.now() - session.timestamp) / 1000 / 60 / 60;
        
        if (age < 1 && session.role === 'send') {
          document.getElementById('sender-id').value = session.id;
          currentPassword = session.password || '';
          setRole('send');
          setupSender();
          setStatus('🔄 Sesión restaurada', 'wait');
        } else {
          localStorage.removeItem(SESSION_KEY);
          await clearAllState();
        }
      }
    };
  </script>
</body>
