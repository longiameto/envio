<!doctype html>
<html lang=es>
<head>
<meta charset=UTF-8>
<meta name=viewport content="width=device-width,initial-scale=1">
<title>Comparte Archivos P2P - v8.0</title>
<script src=https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js></script>
<script src=https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js></script>
<script src=https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js></script>
<script src=https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js></script>
<style>:root{--bg:#0b1120;--card:#1e293b;--text:#e2e8f0;--accent:#3b82f6;--success:#22c55e;--error:#ef4444;--border:#334155}[data-theme=light]{--bg:#f8fafc;--card:#ffffff;--text:#1e293b;--accent:#2563eb;--success:#16a34a;--error:#dc2626;--border:#cbd5e1}*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,sans-serif}body{background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;transition:background .3s,color .3s}.container{background:var(--card);padding:1.5rem;border-radius:16px;width:100%;max-width:540px;box-shadow:0 12px 30px rgba(0,0,0,.5);transition:background .3s}h1{text-align:center;margin-bottom:1.2rem;font-size:1.5rem}.header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}.theme-toggle{background:0 0;border:1px solid var(--border);border-radius:8px;padding:8px;cursor:pointer;color:var(--text);font-size:1.2rem}.row{display:flex;gap:10px;margin-bottom:12px}button,input{width:100%;padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:.95rem}input:focus{outline:2px solid var(--accent);border-color:transparent}button{cursor:pointer;font-weight:600;border:none;transition:all .2s}.btn-role{flex:1;background:var(--border);color:var(--text);padding:16px;font-size:1.1rem}.btn-role.active{background:var(--accent);color:#fff;box-shadow:0 0 15px rgba(59,130,246,.3)}.btn-action{background:var(--accent);color:#fff;margin-top:12px}.btn-action:disabled{opacity:.5;cursor:not-allowed}.btn-secondary{background:var(--border);color:var(--text);margin-top:10px}.btn-danger{background:var(--error);color:#fff;margin-top:12px}.info-box{background:var(--bg);padding:10px;border-radius:8px;font-family:monospace;font-size:.85rem;word-break:break-all;margin:10px 0;border:1px dashed var(--border);text-align:center}.qr-container{display:flex;justify-content:center;margin:10px 0;background:#fff;padding:10px;border-radius:8px;width:fit-content;margin-inline:auto}.status{margin-top:12px;padding:10px;border-radius:8px;text-align:center;font-size:.9rem}.status.wait{background:var(--border);color:var(--text);opacity:.8}.status.ok{background:var(--success);color:#fff}.status.err{background:var(--error);color:#fff}.progress-container{margin-top:15px;background:var(--bg);border-radius:10px;padding:12px;display:none}.progress-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin:8px 0}.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--success));width:0%;transition:width .3s}.stats{display:flex;justify-content:space-between;font-size:.8rem;color:var(--text);opacity:.8;margin-top:5px}.file-list{max-height:120px;overflow-y:auto;margin-top:10px;font-size:.85rem;color:var(--text);opacity:.9;border-top:1px solid var(--border);padding-top:8px}.file-item{padding:4px 0;display:flex;justify-content:space-between}.hidden{display:none!important}.note{font-size:.75rem;color:var(--text);opacity:.7;margin-top:6px;text-align:center}.step-indicator{text-align:center;margin-bottom:15px;padding:8px;background:var(--bg);border-radius:8px;font-size:.9rem;color:var(--accent);font-weight:600}.file-select-buttons{display:flex;flex-direction:column;gap:8px;margin:10px 0}.drop-zone{border:2px dashed var(--border);border-radius:10px;padding:20px;text-align:center;margin:10px 0;transition:all .2s;cursor:pointer}.drop-zone.dragover{border-color:var(--accent);background:rgba(59,130,246,.1)}.drop-zone p{margin:0;color:var(--text);opacity:.8}.history-container{margin-top:15px;background:var(--bg);border-radius:10px;padding:10px;max-height:150px;overflow-y:auto}.history-item{padding:6px 0;border-bottom:1px solid var(--border);font-size:.8rem}.history-item:last-child{border-bottom:none}.history-time{color:var(--text);opacity:.7;font-size:.75rem}.toast-container{position:fixed;top:20px;right:20px;z-index:1000}.toast{background:var(--card);border-left:4px solid var(--accent);padding:12px 16px;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.3);margin-bottom:8px;animation:slideIn .3s}.toast.success{border-color:var(--success)}.toast.error{border-color:var(--error)}@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}@media (max-width:480px){.container{padding:1rem}.btn-role{padding:12px;font-size:1rem}button,input{padding:10px;font-size:.9rem}}@supports (-webkit-touch-callout:none){input[type=file]{font-size:16px}}</style>
<meta http-equiv=Cache-Control content="no-cache, no-store, must-revalidate">
<meta http-equiv=Pragma content=no-cache>
<meta http-equiv=Expires content=0>
</head>
<body>
<div class=toast-container id=toast-container></div>
<div class=container>
<div class=header-row>
<h1>📡 Transferencia P2P</h1>
<button class=theme-toggle onclick=toggleTheme() title="Cambiar tema">🌓</button>
</div>
<div class=step-indicator id=step-indicator>Paso 1: Selecciona tu rol</div>
<div id=role-selection>
<div class=row>
<button class=btn-role id=btn-send onclick='setRole("send")'>📤 Emisor</button>
<button class=btn-role id=btn-receive onclick='setRole("receive")'>📥 Receptor</button>
</div>
</div>
<div id=sender-auth class=hidden>
<input id=sender-id placeholder="Tu ID (6-32 caracteres)" maxlength=32>
<input type=password id=sender-password placeholder="Contraseña (opcional)">
<div class=note>🔒 Cifrado WebRTC</div>
<button class=btn-action onclick=setupSender()>Continuar →</button>
</div>
<div id=receiver-auth class=hidden>
<input id=receiver-target-id placeholder="ID del emisor">
<input type=password id=receiver-password placeholder=Contraseña>
<div class=note>🔑 Pídelo al emisor</div>
<button class=btn-action onclick=connectToSender()>🔗 Conectar</button>
</div>
<div id=sender-ui class=hidden>
<div class=info-box id=my-id-display></div>
<div class=qr-container id=qr-code></div>
<button class=btn-secondary onclick=copyId()>📋 Copiar ID</button>
<div class=note>Escanea o comparte el ID</div>
<div class=drop-zone id=drop-zone>
<p>📁 Arrastra archivos o carpetas aquí</p>
<p style=font-size:.7rem;opacity:.7>o</p>
</div>
<div class=file-select-buttons>
<input type=file id=file-input multiple style=display:none onchange=handleFilesSelected()>
<input type=file id=folder-input webkitdirectory directory multiple style=display:none onchange=handleFilesSelected()>
<button class=btn-action onclick='document.getElementById("file-input").click()'>📄 Archivos</button>
<button class=btn-secondary onclick='document.getElementById("folder-input").click()'>📂 Carpeta</button>
</div>
<div id=files-selected class=hidden>
<div class=note id=files-count></div>
<button class=btn-action id=btn-start onclick=startTransfer()>🚀 Iniciar</button>
</div>
</div>
<div class=progress-container id=progress-ui>
<div style=display:flex;justify-content:space-between;margin-bottom:4px>
<span id=progress-file>Esperando...</span>
<span id=progress-percent>0%</span>
</div>
<div class=progress-bar><div class=progress-fill id=progress-fill></div></div>
<div class=stats>
<span id=progress-speed>0 KB/s</span>
<span id=progress-eta>⏳ --:--</span>
</div>
<div class=file-list id=file-log></div>
</div>
<div class="history-container hidden" id=history-ui>
<div style=font-weight:600;margin-bottom:8px;color:var(--text);opacity:.8>📋 Historial</div>
<div id=history-list></div>
</div>
<div id=status class="status wait">⏳ Selecciona Emisor o Receptor</div>
<button class=btn-danger onclick=hardReset()>🗑️ Reiniciar</button>
</div>
